name: Compile Markdown to PDF

on:
  push:
    paths:
      - 'md/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  compile:
    runs-on: ubuntu-latest
    container:
      image: pandoc/extra:latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install LaTeX packages for Eisvogel
        run: |
          tlmgr option repository https://ftp.math.utah.edu/pub/tex/historic/systems/texlive/2025/tlnet-final
          tlmgr install \
            adjustbox \
            awesomebox \
            babel-german \
            background \
            bidi \
            booktabs \
            collectbox \
            csquotes \
            everypage \
            filehook \
            footmisc \
            footnotebackref \
            framed \
            fontawesome5 \
            fvextra \
            lastpage \
            letltxmacro \
            ly1 \
            mdframed \
            multicol \
            mweights \
            needspace \
            pagecolor \
            pdflscape \
            sourcecodepro \
            sourcesanspro \
            subfigure \
            titling \
            ucharcat \
            ulem \
            unicode-math \
            upquote \
            xecjk \
            xurl \
            zref


      - name: Install pandoc-latex-environment
        run: pip install --break-system-packages pandoc-latex-environment

      - name: Compile markdown files to PDF
        run: |
          mkdir -p compiled
          for f in md/*.md; do
            [ -f "$f" ] || continue
            filename=$(basename "$f" .md)
            yml_file="md/${filename}.yml"
            extra_args=""
            [ -f "$yml_file" ] && extra_args="$yml_file --filter pandoc-latex-environment"
            pandoc $extra_args "$f" \
              --template eisvogel \
              --from markdown+implicit_figures \
              --number-sections \
              --toc \
              --pdf-engine=xelatex \
              -o "compiled/${filename}.pdf"
          done

      - name: Commit compiled PDFs
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add compiled/
          git diff --staged --quiet || git commit -m "Auto-compile: update PDFs from markdown sources"
          git push

