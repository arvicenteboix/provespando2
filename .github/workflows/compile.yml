name: Compile Markdown to PDF

on:
  push:
    paths:
      - 'md/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  compile:
    runs-on: ubuntu-latest
    container:
      image: pandoc/extra:latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install pandoc-latex-environment
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install pandoc-latex-environment
          # aquí ya puedes usar el paquete, por ejemplo:
          python -c "import pandoc_latex_environment; print('ok')"

      - name: Compile markdown files to PDF
        run: |
          mkdir -p compiled
          for f in md/*.md; do
            [ -f "$f" ] || continue
            filename=$(basename "$f" .md)
            yml_file="md/${filename}.yml"
            extra_args=""
            [ -f "$yml_file" ] && extra_args="$yml_file --filter pandoc-latex-environment"
            pandoc $extra_args "$f" \
              --template eisvogel \
              --from markdown+implicit_figures \
              --number-sections \
              --toc \
              --pdf-engine=xelatex \
              -o "compiled/${filename}.pdf"
          done

      - name: Commit compiled PDFs
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add compiled/
          git diff --staged --quiet || git commit -m "Auto-compile: update PDFs from markdown sources"
          git push
